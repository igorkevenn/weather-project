  services:
    nginx:
      image: nginx:alpine
      container_name: weather_app_nginx
      ports:
        - "8181:80"
      volumes:
        - .:/var/www/html
        - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      depends_on:
        - php

    php:
      build:
        context: ./docker/php
      container_name: weather_app_php
      volumes:
        - .:/var/www/html
      environment:
        - OPENWEATHER_API_KEY=${OPENWEATHER_API_KEY}
      env_file:
        - .env

    db:
      image: mysql:8.0
      container_name: weather_app_db
      ports:
        - "3306:3306"
      env_file:
        - .env
      environment:
        MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}
        MYSQL_DATABASE: ${DB_DATABASE}
      volumes:
        - db_data:/var/lib/mysql
      
  volumes:
    db_data: